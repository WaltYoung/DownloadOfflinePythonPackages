name: Download Offline Python Packages

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python 版本（例如 3.8, 3.9, 3.10, 3.11, 3.12）'
        required: true
        default: '3.9'
      target_os:
        description: '目标操作系统（runner 标签）'
        required: true
        default: 'ubuntu-22.04'
        type: choice
        options:
          - ubuntu-22.04
          - windows-latest
          - macos-latest
      packages:
        description: '需要下载的包名（空格分隔）'
        required: true
        default: 'pymysql requests'

jobs:
  download:
    runs-on: ${{ github.event.inputs.target_os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event.inputs.python_version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Create directory
        run: mkdir offline_packages

      - name: Download get-pip.py
        run: |
          curl -o offline_packages/get-pip.py https://bootstrap.pypa.io/get-pip.py
        shell: bash

      - name: Download packages and dependencies
        run: |
          pip download -d offline_packages pip setuptools wheel
          pip download -d offline_packages ${{ github.event.inputs.packages }}

      - name: List downloaded files
        run: ls -la offline_packages
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: offline-packages-py${{ github.event.inputs.python_version }}-${{ runner.os }}
          path: offline_packages
          if-no-files-found: error